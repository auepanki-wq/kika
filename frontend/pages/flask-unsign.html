<!doctype html><html lang="ru"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Flask-unsign Toolkit</title><link rel="stylesheet" href="../styles.css"/></head><body><main class="container"><a class="back" href="../index.html">← На главную</a><section class="card"><h1>Flask-unsign Toolkit</h1><label>API base URL <input id="base-url" placeholder="Пусто = текущий origin"/></label><form id="flask-form"><label>Action <select id="flask-action"><option value="decode">Decode</option><option value="sign">Sign</option><option value="verify">Verify</option></select></label><label>Cookie <textarea id="flask-cookie" rows="3"></textarea></label><label>Secret <input id="flask-secret"/></label><label>Salt <input id="flask-salt" value="cookie-session"/></label><label>Payload JSON <textarea id="flask-payload" rows="3">{"role":"user"}</textarea></label><button type="submit">Run</button><label>Output <textarea id="flask-output" rows="8" readonly></textarea></label></form><pre id="error"></pre></section></main><script src="../js/flask-page.js" type="module"></script></body></html>
