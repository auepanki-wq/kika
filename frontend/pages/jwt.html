<!doctype html><html lang="ru"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>JWT Toolkit</title><link rel="stylesheet" href="../styles.css"/></head><body><main class="container"><a class="back" href="../index.html">← На главную</a><section class="card"><h1>JWT Toolkit</h1><label>API base URL <input id="base-url" placeholder="Пусто = текущий origin"/></label><form id="jwt-form"><label>Action <select id="jwt-action"><option value="decode">Decode</option><option value="sign">Sign</option><option value="verify">Verify</option></select></label><label>Token <textarea id="jwt-token" rows="3"></textarea></label><label>Secret <input id="jwt-secret"/></label><label>Algorithm <select id="jwt-algorithm"><option value="HS256">HS256</option><option value="HS384">HS384</option><option value="HS512">HS512</option></select></label><label>Header JSON <textarea id="jwt-header" rows="3">{"alg":"HS256","typ":"JWT"}</textarea></label><label>Payload JSON <textarea id="jwt-payload" rows="3">{"sub":"user"}</textarea></label><button type="submit">Run</button><label>Output <textarea id="jwt-output" rows="8" readonly></textarea></label></form><pre id="error"></pre></section></main><script src="../js/jwt-page.js" type="module"></script></body></html>
